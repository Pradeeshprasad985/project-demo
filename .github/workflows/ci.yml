name: CI Pipeline

on:
  repository_dispatch:
    types: [trigger-ci]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Generate Dockerfile
      run: bash scripts/generate-dockerfile.sh

    - name: Login to GHCR
      run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u USERNAME --password-stdin

    - name: Build Image
      run: |
        IMAGE=ghcr.io/${{ github.repository }}/app:${{ github.sha }}
        docker build -t $IMAGE .

    - name: Push Image
      run: |
        IMAGE=ghcr.io/${{ github.repository }}/app:${{ github.sha }}
        docker push $IMAGE